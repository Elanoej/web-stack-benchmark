# =============================================================
# nginx.conf — web-stack-benchmark
# =============================================================
# Configuração principal do Nginx.
# Define events e http, depois inclui os arquivos de
# configuração gerados por template em conf.d/.
#
# A imagem nginx:alpine processa templates em
# /etc/nginx/templates/*.template via envsubst e os
# escreve em /etc/nginx/conf.d/.
# =============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
