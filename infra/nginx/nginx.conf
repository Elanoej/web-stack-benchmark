# =============================================================
# nginx.conf — web-stack-benchmark
# =============================================================
# O Nginx aqui funciona como reverse proxy.
#
# Por que ter Nginx na frente dos backends?
# Em produção você sempre terá algo assim (Nginx, Caddy, etc).
# Ele cuida de SSL, compressão, logging e distribui o tráfego.
# No benchmark, queremos que todos os backends passem pelo
# mesmo Nginx para que as condições sejam idênticas.
#
# Cada backend tem seu próprio "upstream" (bloco server {}).
# O teste de carga aponta para a porta do Nginx correspondente.
# =============================================================

events {
    # Máximo de conexões simultâneas por worker process do Nginx.
    # 1024 é o padrão. Para benchmarks com alta concorrência,
    # pode subir para 4096 — mas mantemos padrão para não
    # favorecer nenhum backend com tuning especial.
    worker_connections 1024;
}

http {

    # Formato de log com tempo de resposta — útil para comparar
    log_format benchmark '$remote_addr - $upstream_addr '
                         '"$request" $status $body_bytes_sent '
                         'rt=$request_time ut=$upstream_response_time';

    # ─── Backend: Spring MVC (Kotlin) — porta 8081 ─────────────
    upstream spring_mvc {
        server spring-mvc:8080;
    }

    server {
        listen 8081;
        access_log /var/log/nginx/spring-mvc.log benchmark;

        location / {
            proxy_pass         http://spring_mvc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ─── Backend: Spring WebFlux (Kotlin) — porta 8082 ─────────
    upstream spring_webflux {
        server spring-webflux:8080;
    }

    server {
        listen 8082;
        access_log /var/log/nginx/spring-webflux.log benchmark;

        location / {
            proxy_pass         http://spring_webflux;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ─── Backend: FastAPI async (Uvicorn) — porta 8083 ─────────
    upstream fastapi_async {
        server fastapi-async:8000;
    }

    server {
        listen 8083;
        access_log /var/log/nginx/fastapi-async.log benchmark;

        location / {
            proxy_pass         http://fastapi_async;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ─── Backend: FastAPI + Gunicorn — porta 8084 ───────────────
    upstream fastapi_gunicorn {
        server fastapi-gunicorn:8000;
    }

    server {
        listen 8084;
        access_log /var/log/nginx/fastapi-gunicorn.log benchmark;

        location / {
            proxy_pass         http://fastapi_gunicorn;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ─── Backend: Go net/http — porta 8085 ──────────────────────
    upstream go_stdlib {
        server go-stdlib:8080;
    }

    server {
        listen 8085;
        access_log /var/log/nginx/go-stdlib.log benchmark;

        location / {
            proxy_pass         http://go_stdlib;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}